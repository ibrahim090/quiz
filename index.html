    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        /* =========================================
           Design System & Custom Properties 
           ========================================= */
        :root {
            /* Colors */
            --bg-color: #f0f4f8;
            --bg-gradient: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --primary: #007bff;
            --primary-hover: #0056b3;
            --primary-light: #e6f2ff;
            --correct: #28a745;
            --correct-bg: #e6f6ea;
            --incorrect: #dc3545;
            --incorrect-bg: #faeaea;
            --text-dark: #102a43;
            --text-muted: #486581;

            /* Shadows & Transitions */
            --card-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            --card-shadow-hover: 0 15px 35px rgba(0, 0, 0, 0.08);
            --transition-smooth: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            --border-radius-lg: 16px;
            --border-radius-md: 12px;
        }

        /* =========================================
           Global Styles 
           ========================================= */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            color: var(--text-dark);
            -webkit-font-smoothing: antialiased;
            overflow-y: scroll;
            /* Prevent jump when scrollbar appears */
        }

        .app-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        /* =========================================
           Header Components 
           ========================================= */
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            padding: 15px 25px;
            border-radius: var(--border-radius-lg);
            box-shadow: var(--card-shadow);
            margin-bottom: 30px;
            position: sticky;
            top: 20px;
            z-index: 100;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            background: var(--primary);
            color: white;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-weight: 800;
            font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(0, 123, 255, 0.3);
        }

        .user-name {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .progress-info {
            background: var(--primary-light);
            color: var(--primary);
            padding: 8px 18px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.95rem;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02);
        }

        /* =========================================
           Question Cards 
           ========================================= */
        .question-card {
            background: var(--card-bg);
            border-radius: var(--border-radius-lg);
            padding: 25px 30px;
            box-shadow: var(--card-shadow);
            margin-bottom: 25px;
            transform: translateY(0);
            transition: var(--transition-smooth);
            border: 1px solid rgba(255, 255, 255, 0.6);
            opacity: 0;
            /* Handled by JS fade-in */
        }

        .question-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--card-shadow-hover);
        }

        .q-number {
            font-size: 0.95rem;
            color: var(--primary);
            background: var(--primary-light);
            padding: 4px 12px;
            border-radius: 6px;
            margin-bottom: 12px;
            font-weight: 700;
            display: inline-block;
        }

        .q-text {
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        /* =========================================
           Options Styling
           ========================================= */
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            padding: 16px 20px;
            border: 2px solid #e2e8f0;
            border-radius: var(--border-radius-md);
            cursor: pointer;
            transition: var(--transition-smooth);
            font-weight: 600;
            font-size: 1.05rem;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        .option:hover {
            border-color: var(--primary);
            background: var(--primary-light);
            box-shadow: 0 4px 12px rgba(0, 123, 255, 0.08);
            transform: scale(1.01);
        }

        /* Selected State */
        .option.selected {
            border-color: var(--primary);
            background: #f4f9ff;
        }

        .option.selected::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            width: 6px;
            background: var(--primary);
        }

        /* Locked State (After Checking Results) */
        .locked .option {
            pointer-events: none;
        }

        /* Correct Answer State */
        .option.correct-answer {
            border-color: var(--correct);
            background: var(--correct-bg);
            color: #155724;
        }

        .option.correct-answer::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            width: 6px;
            background: var(--correct);
        }

        /* Wrong Answer State */
        .option.wrong-answer {
            border-color: var(--incorrect);
            background: var(--incorrect-bg);
            color: #721c24;
        }

        .option.wrong-answer::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            width: 6px;
            background: var(--incorrect);
        }

        /* =========================================
           Buttons
           ========================================= */
        .actions-container {
            display: flex;
            justify-content: center;
            margin: 30px 0 60px 0;
        }

        .btn {
            padding: 16px 45px;
            border: none;
            border-radius: 40px;
            font-family: inherit;
            font-size: 1.25rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition-smooth);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.3) 50%, rgba(255, 255, 255, 0) 100%);
            transform: skewX(-20deg);
            transition: all 0.6s ease;
        }

        .btn:hover::after {
            left: 150%;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, #00d2ff 100%);
            color: white;
        }

        .btn-primary:hover {
            box-shadow: 0 10px 25px rgba(0, 123, 255, 0.4);
            transform: translateY(-3px);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #102a43 0%, #243b53 100%);
            color: white;
        }

        .btn-secondary:hover {
            box-shadow: 0 10px 25px rgba(16, 42, 67, 0.3);
            transform: translateY(-3px);
        }

        /* =========================================
           Success Screen Component
           ========================================= */
        .success-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            opacity: 0;
            transform: scale(0.9) translateY(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .success-card.active {
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .trophy {
            font-size: 6rem;
            margin-bottom: 25px;
            display: inline-block;
            animation: floatTrophy 3s ease-in-out infinite;
        }

        .success-card h2 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 15px;
            color: var(--text-dark);
        }

        .score-text {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            background: var(--primary-light);
            padding: 15px 30px;
            border-radius: 12px;
            display: inline-block;
            margin-bottom: 35px;
        }

        /* =========================================
           Animations
           ========================================= */
        @keyframes floatTrophy {
            0% {
                transform: translateY(0px) rotate(0deg);
            }

            50% {
                transform: translateY(-15px) rotate(5deg);
            }

            100% {
                transform: translateY(0px) rotate(0deg);
            }
        }

        @keyframes popIn {
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .fade-in {
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsiveness */
        @media (max-width: 600px) {
            .app-container {
                padding: 15px;
            }

            .quiz-header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .success-card {
                padding: 40px 20px;
            }

            .trophy {
                font-size: 4.5rem;
            }

            .q-text {
                font-size: 1.15rem;
            }
        }
    </style>
</head>

        /**
         * =========================================
         * State Variables
         * =========================================
         */
        const BATCH_SIZE = 25;
        let currentBatchIndex = 0;
        let userAnswers = {}; // Stores answers as key/value pairs { globalQuestionIndex: selectedOptionIndex }
        let totalScore = 0;
        // DOM Elements
        const DOM = {
            progressInfo: document.getElementById('progressInfo'),
            questionsContainer: document.getElementById('questionsContainer'),
            checkResultsBtn: document.getElementById('checkResultsBtn'),
            nextBatchBtn: document.getElementById('nextBatchBtn'),
            quizMain: document.getElementById('quizMain'),
            resultScreen: document.getElementById('resultScreen'),
            successCard: document.getElementById('successCard'),
            finalScoreText: document.getElementById('finalScoreText'),
            restartBtn: document.getElementById('restartBtn'),
            quizHeader: document.getElementById('quizHeader')
        };
        /**
         * =========================================
         * Core Logic
         * =========================================
         */
        // Returns the total number of batches/pages needed
        function getTotalBatches() {
            return Math.ceil(questions.length / BATCH_SIZE) || 1;
        }
        // Initialize or Restart the Quiz
        function initQuiz() {
            currentBatchIndex = 0;
            userAnswers = {};
            totalScore = 0;

            // View transition resets
            DOM.resultScreen.style.display = 'none';
            DOM.successCard.classList.remove('active');
            DOM.quizMain.style.display = 'block';
            DOM.quizHeader.style.display = 'flex';

            renderBatch();
        }
        // Render a specific batch of 25 questions
        function renderBatch() {
            const startIdx = currentBatchIndex * BATCH_SIZE;
            const endIdx = Math.min(startIdx + BATCH_SIZE, questions.length);
            const batchQuestions = questions.slice(startIdx, endIdx);

            // Update Header Progress
            const totalBatches = getTotalBatches();
            DOM.progressInfo.textContent = `المجموعة ${currentBatchIndex + 1} من ${totalBatches}`;

            // Clear current cards
            DOM.questionsContainer.innerHTML = '';

            // Generate HTML for current batch
            batchQuestions.forEach((q, idx) => {
                const globalIdx = startIdx + idx;
                const delay = idx * 0.05; // staggered animation delay

                const qCard = document.createElement('div');
                qCard.className = 'question-card fade-in';
                qCard.style.animationDelay = `${delay}s`;

                // Construct options HTML
                const optionsHTML = q.options.map((opt, optIdx) => `
                    <div class="option" onclick="selectOption(${globalIdx}, ${optIdx})" id="opt-${globalIdx}-${optIdx}">
                        ${opt}
                    </div>
                `).join('');
                qCard.innerHTML = `
                    <div class="q-number">سؤال ${globalIdx + 1}</div>
                    <div class="q-text">${q.question}</div>
                    <div class="options-container" id="options-${globalIdx}">
                        ${optionsHTML}
                    </div>
                `;

                DOM.questionsContainer.appendChild(qCard);
            });

            // Manage Action Buttons State
            DOM.checkResultsBtn.style.display = 'block';
            DOM.nextBatchBtn.style.display = 'none';

            // Smooth Scroll to Top
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        // Handle Option Selection
        window.selectOption = function (globalIdx, optIdx) {
            // Prevent selection if results are already showing (Next Button is visible)
            if (DOM.checkResultsBtn.style.display === 'none') return;

            userAnswers[globalIdx] = optIdx;

            // Update UI: Remove 'selected' class from all sibling options
            const container = document.getElementById(`options-${globalIdx}`);
            const allOptions = container.querySelectorAll('.option');
            allOptions.forEach(opt => opt.classList.remove('selected'));

            // Add 'selected' class to the clicked option
            document.getElementById(`opt-${globalIdx}-${optIdx}`).classList.add('selected');
        };
        // Handle Check Results Action
        DOM.checkResultsBtn.addEventListener('click', () => {
            const startIdx = currentBatchIndex * BATCH_SIZE;
            const endIdx = Math.min(startIdx + BATCH_SIZE, questions.length);

            // Loop through questions in current batch to evaluate answers
            for (let i = startIdx; i < endIdx; i++) {
                const q = questions[i];
                const selectedIdx = userAnswers[i];
                const correctIdx = q.answer;

                const container = document.getElementById(`options-${i}`);
                if (!container) continue;

                // Visually lock the container to indicate it's graded
                container.classList.add('locked');

                if (selectedIdx !== undefined) {
                    if (selectedIdx === correctIdx) {
                        // User got it right
                        document.getElementById(`opt-${i}-${selectedIdx}`).classList.add('correct-answer');
                        totalScore++;
                    } else {
                        // User got it wrong
                        document.getElementById(`opt-${i}-${selectedIdx}`).classList.add('wrong-answer');
                        // Automatically show the correct answer
                        document.getElementById(`opt-${i}-${correctIdx}`).classList.add('correct-answer');
                    }
                } else {
                    // User didn't answer this question, just show the correct answer
                    document.getElementById(`opt-${i}-${correctIdx}`).classList.add('correct-answer');
                }
            }

            // Swap Buttons
            DOM.checkResultsBtn.style.display = 'none';

            if (currentBatchIndex + 1 < getTotalBatches()) {
                DOM.nextBatchBtn.textContent = "المجموعة التالية";
            } else {
                DOM.nextBatchBtn.textContent = "إنهاء الاختبار"; // Finish Quiz
            }

            DOM.nextBatchBtn.style.display = 'block';
        });
        // Handle Next Batch / End Quiz Action
        DOM.nextBatchBtn.addEventListener('click', () => {
            currentBatchIndex++;

            // Check if there are more batches
            if (currentBatchIndex < getTotalBatches()) {
                renderBatch();
            } else {
                // End of quiz logic
                DOM.quizMain.style.display = 'none';
                DOM.quizHeader.style.display = 'none';
                DOM.resultScreen.style.display = 'flex';
                DOM.successCard.classList.add('active'); // triggers animation

                // Update Score Board text
                DOM.finalScoreText.textContent = `نتيجتك الكلية هي: ${totalScore} من ${questions.length}`;
            }
        });
        // Handle Restart Action
        DOM.restartBtn.addEventListener('click', () => {
            initQuiz();
        });
        /**
         * =========================================
         * Application Startup
         * =========================================
         */
        window.addEventListener('DOMContentLoaded', () => {
            initQuiz();
        });
    </script>
